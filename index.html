<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | Shridhar Madival</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        /* Locks the screen so they cannot scroll past the video */
        body { overflow: hidden; background-color: #000; } 

        .welcome-entry {
            position: relative; width: 100%; height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; z-index: 2;
        }

        /* Forces video to the background */
        .welcome-video {
            position: absolute; top: 0; left: 0; width: 100%; height: 100vh;
            object-fit: cover; z-index: -1;
        }

        /* Dark overlay so text is readable */
        .welcome-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100vh;
            background: rgba(0, 0, 0, 0.5); z-index: 0; 
        }

        .welcome-content {
            position: relative; z-index: 1; text-align: center;
        }

        h1 { font-size: 4rem; color: #fff; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); margin-bottom: 15px; }
        p { font-size: 1.5rem; color: #38bdf8; margin-bottom: 30px; text-shadow: 1px 1px 5px rgba(0,0,0,0.8); }

        .enter-btn {
            display: inline-block; padding: 12px 30px; border: 2px solid #38bdf8;
            color: #38bdf8; text-decoration: none; font-weight: bold;
            border-radius: 30px; transition: all 0.3s ease;
            background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(5px);
        }

        .enter-btn:hover {
            background: #38bdf8; color: #0f172a; transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(56, 189, 248, 0.4);
        }
    </style>
</head>
<body>

    <div class="welcome-entry">
        <video autoplay muted loop playsinline class="welcome-video">
            <source src="welcome.mp4" type="video/mp4">
        </video>
        <div class="welcome-overlay"></div>
        
        <div class="welcome-content">
            <h1>Welcome to My World</h1>
            <p>Engineering the future through electronics and code.</p>
            <a href="home.html" class="enter-btn">Explore My Profile 🚀</a>
        </div>
    </div>

</body>
</html>
