<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | Shridhar Madival</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- BASE STYLES --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { overflow: hidden; background-color: #000; } 

        /* --- THE WELCOME STAGE & VIDEO --- */
        .welcome-entry {
            position: relative; width: 100%; height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; z-index: 2;
        }

        .welcome-video {
            position: absolute; top: 0; left: 0; width: 100%; height: 100vh;
            object-fit: cover; z-index: -1;
        }

        .welcome-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100vh;
            background: rgba(0, 0, 0, 0.5); z-index: 0; 
        }

        /* --- THE TEXT & ENTRY BUTTON --- */
        .welcome-content {
            position: relative; z-index: 1; text-align: center;
        }

        h1 { font-size: 4rem; color: #fff; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); margin-bottom: 15px; }
        p { font-size: 1.5rem; color: #38bdf8; margin-bottom: 30px; text-shadow: 1px 1px 5px rgba(0,0,0,0.8); }

        .enter-btn {
            display: inline-block; padding: 12px 30px; border: 2px solid #38bdf8;
            color: #38bdf8; text-decoration: none; font-weight: bold;
            border-radius: 30px; transition: all 0.3s ease;
            background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(5px);
        }

        .enter-btn:hover {
            background: #38bdf8; color: #0f172a; transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(56, 189, 248, 0.4);
        }

        /* --- FLOATING FEEDBACK BUTTON --- */
        .feedback-fab {
            position: fixed; bottom: 30px; left: 30px; background: #1e293b;
            color: #cbd5e1; border: 1px solid #334155; padding: 12px 20px;
            border-radius: 30px; font-weight: 600; cursor: pointer;
            z-index: 99; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: all 0.3s ease; display: flex; align-items: center; gap: 8px;
        }

        .feedback-fab:hover {
            border-color: #ef4444; color: #fff; transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(239, 68, 68, 0.3);
        }

        /* --- THE FEEDBACK MODAL (POPUP) --- */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); z-index: 100; align-items: center;
            justify-content: center; backdrop-filter: blur(5px);
        }

        .modal-box {
            background: #0f172a; border: 1px solid #38bdf8; padding: 30px;
            border-radius: 15px; width: 90%; max-width: 400px; position: relative;
            text-align: center; box-shadow: 0 10px 30px rgba(56, 189, 248, 0.2);
            animation: popIn 0.3s ease;
        }

        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; color: #94a3b8; cursor: pointer; transition: 0.3s; }
        .close-btn:hover { color: #ef4444; }
        .modal-input { width: 100%; padding: 12px; margin-bottom: 15px; background: #1e293b; border: 1px solid #334155; color: white; border-radius: 8px; font-family: 'Poppins', sans-serif; }
        .modal-input:focus { outline: none; border-color: #38bdf8; }
        .submit-btn { width: 100%; padding: 12px; background: #38bdf8; color: #0f172a; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .submit-btn:hover { background: #fff; box-shadow: 0 0 15px #fff; }
    </style>
</head>
<body>

    <div class="welcome-entry">
        <video autoplay muted loop playsinline class="welcome-video">
            <source src="welcome.mp4" type="video/mp4">
        </video>
        <div class="welcome-overlay"></div>
        
        <div class="welcome-content">
            <h1>Welcome to My World</h1>
            <p>Engineering the future through electronics and code.</p>
            <a href="home.html" class="enter-btn">Explore My Profile 🚀</a>
        </div>
    </div>

    <button class="feedback-fab" onclick="openFeedbackModal()">
        <span style="font-size: 1.2rem;">🐛</span> Report Issue
    </button>

    <div id="feedback-modal" class="modal-overlay">
        <div class="modal-box">
            <span class="close-btn" onclick="closeFeedbackModal()">&times;</span>
            <h2 style="color: #38bdf8; margin-bottom: 15px;">Report Issue</h2>
            <p style="font-size: 0.9rem; color: #94a3b8; margin-bottom: 20px;">Found a bug on the site? Let me know!</p>
            
            <form id="feedback-form" action="https://formspree.io/f/xbdpvbgl" method="POST">
                <input type="hidden" name="_subject" value="🚨 BUG REPORT from Welcome Page">
                
                <input type="text" name="name" placeholder="Your Name (Optional)" class="modal-input">
                <textarea name="message" placeholder="Describe the issue here..." required class="modal-input" rows="4"></textarea>
                <button type="submit" class="submit-btn">Submit Report</button>
            </form>
            
            <p id="feedback-success" style="display: none; color: #38bdf8; margin-top: 15px; font-weight: bold;">✅ Report sent successfully! Thank you.</p>
        </div>
    </div>

    <script>
        function openFeedbackModal() {
            document.getElementById('feedback-modal').style.display = 'flex';
        }

        function closeFeedbackModal() {
            document.getElementById('feedback-modal').style.display = 'none';
            document.getElementById('feedback-success').style.display = 'none';
        }

        var feedbackForm = document.getElementById("feedback-form");
        feedbackForm.addEventListener("submit", async function(event) {
            event.preventDefault(); 
            var data = new FormData(event.target);
            
            fetch(event.target.action, {
                method: feedbackForm.method,
                body: data,
                headers: { 'Accept': 'application/json' }
            }).then(response => {
                if (response.ok) {
                    feedbackForm.reset(); 
                    document.getElementById('feedback-success').style.display = 'block'; 
                    setTimeout(closeFeedbackModal, 3000); 
                } else {
                    alert("Oops! There was a problem sending your report.");
                }
            });
        });
    </script>

</body>
</html>
