        /* --- THE FIX FOR THE SKILLS MARQUEE --- */
/* =========================
   GLOBAL SETTINGS
========================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

html {
    scroll-behavior: smooth;
}

body {
    background: #0f172a;
    color: #e2e8f0;
    line-height: 1.6;
    overflow-x: hidden;
    position: relative;
}

/* =========================
   FULLSCREEN VIDEO
========================= */
#bg-video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    z-index: -2;
    filter: brightness(30%);
    pointer-events: none;
    transform: translateZ(0);
    backface-visibility: hidden;
}

/* Dark Overlay */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: -1;
    pointer-events: none;
}

/* =========================
   WELCOME SECTION
========================= */
.welcome-entry {
    min-height: 100vh;
    width: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
}

.welcome-entry h1 {
    font-size: 4rem;
    color: #ffffff;
    margin-bottom: 15px;
    text-shadow: 0 0 20px rgba(0,0,0,0.8);
}

.welcome-entry p {
    font-size: 1.5rem;
    color: #38bdf8;
    margin-bottom: 30px;
    text-align: center;
}

/* =========================
   BUTTON
========================= */
.scroll-down-btn {
    display: inline-block;
    padding: 12px 30px;
    border: 2px solid #38bdf8;
    border-radius: 30px;
    color: #38bdf8;
    text-decoration: none;
    font-weight: 600;
    transition: 0.3s;
}

.scroll-down-btn:hover {
    background: #38bdf8;
    color: #0f172a;
    transform: translateY(-4px);
}

/* =========================
   MAIN CONTAINER
========================= */
.container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
    position: relative;
}

/* =========================
   PROFILE SECTION
========================= */
.profile-header {
    text-align: center;
    margin-bottom: 50px;
}

.profile-img {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid #38bdf8;
    box-shadow: 0 0 25px rgba(56,189,248,0.6);
}

.profile-name {
    margin-top: 20px;
    font-size: 2.5rem;
    color: white;
}

.tagline {
    color: #38bdf8;
    font-size: 1.2rem;
    margin-top: 10px;
}

/* =========================
   CONTENT BOXES
========================= */
.content-box {
    background: rgba(15,23,42,0.75);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 15px;
    padding: 30px;
    margin-bottom: 30px;
    transition: 0.3s;
}

.content-box:hover {
    transform: translateY(-5px);
    border-color: #38bdf8;
}

h2 {
    color: #38bdf8;
    margin-bottom: 20px;
    border-bottom: 2px solid #334155;
    padding-bottom: 10px;
}

p {
    color: #cbd5e1;
    margin-bottom: 15px;
}

/* =========================
   EDUCATION SECTION
========================= */
.edu-item {
    position: relative;
    padding-left: 25px;
    border-left: 2px solid #38bdf8;
    margin-bottom: 25px;
}

.edu-item::before {
    content: "";
    position: absolute;
    left: -7px;
    top: 5px;
    width: 12px;
    height: 12px;
    background: #38bdf8;
    border-radius: 50%;
}

.college-link-img {
    width: 100%;
    max-width: 320px;
    border-radius: 10px;
    border: 2px solid #334155;
    margin-top: 15px;
    transition: 0.3s;
}

.college-link-img:hover {
    border-color: #38bdf8;
    transform: scale(1.02);
}

/* =========================
   SKILLS MARQUEE
========================= */
.skills-wrapper {
    overflow: hidden;
    width: 100%;
    padding: 20px 0;
}

.marquee-track {
    display: flex;
    gap: 15px;
    width: max-content;
    padding: 10px 0;
}

.track-left {
    animation: scrollLeft 20s linear infinite;
}

.track-right {
    animation: scrollRight 20s linear infinite;
}

.skill-pill {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #1e293b;
    border: 1px solid #334155;
    padding: 12px 25px;
    border-radius: 999px;
    white-space: nowrap;
    color: #cbd5e1;
    transition: 0.3s;
}

.skill-pill:hover {
    border-color: #38bdf8;
    box-shadow: 0 0 15px rgba(56,189,248,0.4);
    transform: translateY(-3px);
}

/* =========================
   SKILL TAGS
========================= */
.skill-tag {
    display: inline-block;
    margin: 5px;
    padding: 8px 15px;
    border-radius: 20px;
    border: 1px solid #38bdf8;
    color: #38bdf8;
    background: rgba(56,189,248,0.1);
}

/* =========================
   CONTACT
========================= */
#contact {
    text-align: center;
    padding: 40px;
}

#contact input,
#contact textarea {
    width: 80%;
    max-width: 600px;
    margin: 10px;
    padding: 12px;
    border: none;
    border-radius: 8px;
}

#contact button {
    padding: 12px 25px;
    background: #38bdf8;
    color: #0f172a;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
}

#contact button:hover {
    opacity: 0.9;
}

/* =========================
   LINKEDIN BUTTON
========================= */
.contact-btn {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 30px;
    border-radius: 30px;
    text-decoration: none;
    background: #0077b5;
    color: white;
    transition: 0.3s;
}

.contact-btn:hover {
    background: white;
    color: #0077b5;
}

/* =========================
   ANIMATIONS
========================= */
@keyframes scrollLeft {
    from {
        transform: translateX(0);
    }
    to {
        transform: translateX(-50%);
    }
}

@keyframes scrollRight {
    from {
        transform: translateX(-50%);
    }
    to {
        transform: translateX(0);
    }
}

/* =========================
   MOBILE
========================= */
@media (max-width: 768px) {

    .welcome-entry h1 {
        font-size: 2.5rem;
    }

    .welcome-entry p {
        font-size: 1.1rem;
    }

    .profile-name {
        font-size: 2rem;
    }

    .profile-img {
        width: 140px;
        height: 140px;
    }

    .content-box {
        padding: 20px;
    }

    #contact input,
    #contact textarea {
        width: 95%;
    }
}

    <script>
        var form = document.getElementById("my-contact-form");
        
        form.addEventListener("submit", async function(event) {
            event.preventDefault(); 
            
            var data = new FormData(event.target);
            
            fetch(event.target.action, {
                method: form.method,
                body: data,
                headers: {
                    'Accept': 'application/json'
                }
            }).then(response => {
                if (response.ok) {
                    window.location.href = "https://shridharmadival.in/thankyou.html";
