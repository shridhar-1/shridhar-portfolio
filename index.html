<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | Shridhar Madival</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- BASE STYLES (Deep Crimson Background) --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        html { scroll-behavior: smooth; } 
        body { background-color: #1a0505; overflow-x: hidden; } 

        /* --- 1. THE WELCOME STAGE & VIDEO --- */
        .welcome-entry {
            position: relative; width: 100%; height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; z-index: 2;
        }

        .welcome-video {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            object-fit: cover; z-index: -2;
        }

        .welcome-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: rgba(30, 0, 0, 0.7); z-index: -1; 
        }

        .welcome-content { position: relative; z-index: 1; text-align: center; }

        /* --- NEW ELEMENTS (Avatar & Tech Tag) --- */
        .intro-avatar {
            width: 120px !important; 
            height: 120px !important; 
            border-radius: 50% !important;
            border: 2px solid #ff003c !important; 
            box-shadow: 0 0 20px rgba(255, 0, 60, 0.6) !important;
            margin-bottom: 15px !important; 
            margin-top: 20px !important;
            object-fit: cover !important;
            display: inline-block !important;
        }

        .tech-tag {
            color: #ff003c; font-family: monospace; font-size: 1rem;
            letter-spacing: 2px; margin-bottom: 10px; text-shadow: 0 0 5px rgba(255,0,60,0.5);
        }
        
        h1 { font-size: 4.5rem; color: #fff; text-shadow: 2px 2px 15px rgba(255, 0, 60, 0.5); margin-bottom: 10px; }
        
        /* Cyberpunk Neon Red Subtitle */
        .subtitle { 
            font-size: 1.5rem; 
            color: #e2e8f0; 
            margin-bottom: 40px; 
            text-shadow: 0 0 10px rgba(255, 0, 60, 0.9); 
        }

        /* The Scroll Down Ghost Button */
        .scroll-down-btn {
            display: inline-block; padding: 12px 30px; 
            border: 2px solid #ff003c; 
            background: transparent; 
            color: #fff; text-decoration: none; font-weight: bold; font-size: 1.1rem;
            border-radius: 30px; transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(255, 0, 60, 0.3);
            animation: bounce 2s infinite;
        }
        
        .scroll-down-btn:hover { 
            background: #ff003c; color: #fff; animation: none; 
            box-shadow: 0 0 25px rgba(255, 0, 60, 0.8); 
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-15px); }
            60% { transform: translateY(-7px); }
        }

        /* --- 2. THE SCROLL INTRO SECTION --- */
        .intro-section {
            min-height: 100vh; width: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: transparent; 
            padding: 40px 20px; text-align: center;
            position: relative; z-index: 5;
        }

        .intro-text-container { max-width: 900px; }

        #typewriter-text {
            font-size: 2.2rem; color: #e2e8f0; line-height: 1.6; display: inline; font-weight: 300;
        }

        .highlight { color: #ff003c; font-weight: 600; text-shadow: 0 0 8px rgba(255, 0, 60, 0.4); }

        .cursor {
            font-size: 2.5rem; color: #ff003c; animation: blink 0.8s infinite;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* Cyberpunk Final Entry Button */
        .enter-btn {
            display: inline-block; padding: 15px 40px; background: #ff003c;
            color: #fff; text-decoration: none; font-weight: bold; font-size: 1.2rem;
            border-radius: 30px; transition: all 0.3s ease; margin-top: 50px;
            box-shadow: 0 0 15px rgba(255, 0, 60, 0.4);
            opacity: 0; transform: translateY(20px);
        }

        .enter-btn:hover { box-shadow: 0 0 30px rgba(255, 0, 60, 0.8); transform: translateY(-5px); background: #ff3366; }
        .enter-btn.visible { opacity: 1; transform: translateY(0); }

        /* --- 3. LAB PROGRAMS SECTION WITH BUTTONS --- */
        .lab-programs-section {
            width: 100%; padding: 60px 20px; text-align: center;
            background: rgba(26, 5, 5, 0.9); position: relative; z-index: 5;
            border-top: 1px solid rgba(255, 0, 60, 0.2);
            backdrop-filter: blur(10px);
        }

        .lab-programs-section h2 {
            color: #ff003c; font-size: 2rem; margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(255, 0, 60, 0.5);
        }

        .resource-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;
            max-width: 900px; margin: 0 auto;
        }

        .resource-card {
            background: #2a0808; border: 1px solid #ff003c; padding: 20px;
            border-radius: 12px; display: flex; flex-direction: column; justify-content: space-between;
            align-items: center; text-align: center; gap: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); transition: all 0.3s ease;
        }

        .resource-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(255, 0, 60, 0.4);
            border-color: #ff3366;
        }

        .resource-card span {
            color: #e2e8f0; font-weight: 600; font-size: 0.95rem;
        }

        .pdf-action-btn {
            display: inline-block; padding: 10px 20px; background: transparent;
            color: #ff003c; border: 2px solid #ff003c; border-radius: 25px;
            text-decoration: none; font-weight: bold; font-size: 0.9rem;
            transition: all 0.3s ease; width: 100%;
        }

        .pdf-action-btn:hover {
            background: #ff003c; color: #fff;
            box-shadow: 0 0 15px rgba(255, 0, 60, 0.6);
        }

        /* --- 4. FLOATING FEEDBACK BUTTON & MODAL --- */
        .feedback-fab { position: fixed; bottom: 30px; left: 30px; background: #2a0808; color: #e2e8f0; border: 1px solid #ff003c; padding: 12px 20px; border-radius: 30px; font-weight: 600; cursor: pointer; z-index: 99; box-shadow: 0 5px 15px rgba(0,0,0,0.5); transition: all 0.3s ease; display: flex; align-items: center; gap: 8px; }
        .feedback-fab:hover { background: #ff003c; color: #fff; transform: translateY(-3px); box-shadow: 0 8px 25px rgba(255, 0, 60, 0.5); }
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 0, 0, 0.85); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-box { background: #1a0505; border: 1px solid #ff003c; padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; position: relative; text-align: center; animation: popIn 0.3s ease; box-shadow: 0 10px 40px rgba(255, 0, 60, 0.2); }
        
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; color: #ff003c; cursor: pointer; transition: 0.3s; }
        .close-btn:hover { color: #fff; text-shadow: 0 0 10px #ff003c; }
        .modal-input { width: 100%; padding: 12px; margin-bottom: 15px; background: #2a0808; border: 1px solid #ff003c; color: white; border-radius: 8px; }
        .modal-input:focus { outline: none; box-shadow: 0 0 10px rgba(255, 0, 60, 0.3); }
        .submit-btn { width: 100%; padding: 12px; background: #ff003c; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 0 10px rgba(255, 0, 60, 0.4); }
        .submit-btn:hover { background: #fff; color: #ff003c; box-shadow: 0 0 20px #fff; }
        
        /* --- 📱 MOBILE OPTIMIZATION FIXES --- */
        @media (max-width: 768px) { 
            .welcome-entry, .intro-section { min-height: 100vh; min-height: 100dvh; }
            h1 { font-size: 2.8rem; margin-top: -10px; } 
            .subtitle { font-size: 1.1rem; padding: 0 15px; margin-bottom: 30px; }
            #typewriter-text { font-size: 1.3rem; line-height: 1.8; } 
            .cursor { font-size: 1.5rem; }
            .intro-text-container { padding: 0 10px; }
            .enter-btn { padding: 12px 25px; font-size: 1rem; margin-top: 30px; }
            .scroll-down-btn { font-size: 0.9rem; padding: 10px 20px; }
            .feedback-fab { bottom: 15px; left: 15px; padding: 10px 15px; font-size: 0.8rem; }
            .feedback-fab span { font-size: 1rem !important; }
            .modal-box { width: 95%; padding: 20px; }
            .intro-avatar { width: 90px !important; height: 90px !important; margin-bottom: 10px !important; }
            .lab-programs-section h2 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="welcome-entry">
        <video autoplay muted loop playsinline class="welcome-video">
            <source src="welcome.mp4" type="video/mp4">
        </video>
        <div class="welcome-overlay"></div>
        
        <div class="welcome-content">
            <img src="profilepic.png" alt="Shridhar" class="intro-avatar">
            <div class="tech-tag">&lt; Shridhar.ECE /&gt;</div>
            
            <h1>Welcome.</h1>
            <p class="subtitle">To the digital workspace of a future engineer.</p>
            <a href="#intro" class="scroll-down-btn">Scroll Down 👇</a>
        </div>
    </div> 
    
    <div id="intro" class="intro-section">
        <div class="intro-text-container">
            <h2 id="typewriter-text"></h2><span class="cursor">|</span>
            <br>
            <a href="home.html" class="enter-btn" id="final-enter-btn">Explore My Profile 🚀</a>
        </div>
    </div>
    <button class="feedback-fab" onclick="openFeedbackModal()"><span>🐛</span> Report Issue</button>
    <div id="feedback-modal" class="modal-overlay">
        <div class="modal-box">
            <span class="close-btn" onclick="closeFeedbackModal()">&times;</span>
            <h2 style="color: #ff003c; margin-bottom: 15px; text-shadow: 0 0 10px rgba(255,0,60,0.3);">Report Issue</h2>
            <form id="feedback-form" action="https://formspree.io/f/xbdpvbgl" method="POST">
                <input type="hidden" name="_subject" value="🚨 BUG REPORT from Welcome Page">
                <input type="text" name="name" placeholder="Your Name (Optional)" class="modal-input">
                <textarea name="message" placeholder="Describe the issue here..." required class="modal-input" rows="4"></textarea>
                <button type="submit" class="submit-btn">Submit Report</button>
            </form>
            <p id="feedback-success" style="display: none; color: #ff003c; margin-top: 15px; font-weight: bold; text-shadow: 0 0 5px rgba(255,0,60,0.5);">✅ Report sent successfully!</p>
        </div>
    </div>

    <script>
        const introText = "Hi, I am Shridhar. An Electronics & Communication Engineer specializing in IoT embedded systems, hardware design, and clean web development. ";
        let index = 0;
        const speed = 40; 
        let hasTyped = false; 

        const targetElement = document.getElementById("typewriter-text");
        const enterButton = document.getElementById("final-enter-btn");

        function typeWriter() {
            if (index < introText.length) {
                targetElement.innerHTML += introText.charAt(index);
                index++;
                setTimeout(typeWriter, speed);
            } else {
                enterButton.classList.add("visible");
            }
        }

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting && !hasTyped) {
                    hasTyped = true; 
                    setTimeout(typeWriter, 400); 
                }
            });
        }, { threshold: 0.5 }); 

        observer.observe(document.getElementById("intro"));

        function openFeedbackModal() { document.getElementById('feedback-modal').style.display = 'flex'; }
        function closeFeedbackModal() { document.getElementById('feedback-modal').style.display = 'none'; document.getElementById('feedback-success').style.display = 'none'; }
        
        var feedbackForm = document.getElementById("feedback-form");
        feedbackForm.addEventListener("submit", async function(event) {
            event.preventDefault(); 
            var data = new FormData(event.target);
            fetch(event.target.action, { method: feedbackForm.method, body: data, headers: { 'Accept': 'application/json' } }).then(response => {
                if (response.ok) { feedbackForm.reset(); document.getElementById('feedback-success').style.display = 'block'; setTimeout(closeFeedbackModal, 3000); } 
                else { alert("Oops! There was a problem sending your report."); }
            });
        });
    </script>

</body>
</html>
