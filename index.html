<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | Shridhar Madival</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- BASE STYLES --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        html { scroll-behavior: smooth; } /* Enables smooth scrolling down */
        body { background-color: #0f172a; overflow-x: hidden; } 

        /* --- 1. THE WELCOME STAGE & VIDEO --- */
        .welcome-entry {
            position: relative; width: 100%; height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; z-index: 2;
        }

        .welcome-video {
            position: absolute; top: 0; left: 0; width: 100%; height: 100vh;
            object-fit: cover; z-index: -1;
        }

        .welcome-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100vh;
            background: rgba(0, 0, 0, 0.6); z-index: 0; 
        }

        .welcome-content { position: relative; z-index: 1; text-align: center; }
        
        h1 { font-size: 4.5rem; color: #fff; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); margin-bottom: 10px; }
        .subtitle { font-size: 1.5rem; color: #38bdf8; margin-bottom: 40px; text-shadow: 1px 1px 5px rgba(0,0,0,0.8); }

        /* The Scroll Down Button */
        .scroll-down-btn {
            display: inline-block; padding: 12px 30px; border: 2px solid white;
            color: white; text-decoration: none; font-weight: bold; font-size: 1.1rem;
            border-radius: 30px; transition: all 0.3s ease;
            animation: bounce 2s infinite;
        }
        .scroll-down-btn:hover { background: white; color: #000; animation: none; }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-15px); }
            60% { transform: translateY(-7px); }
        }

        /* --- 2. THE NEW SCROLL INTRO SECTION --- */
        .intro-section {
            min-height: 100vh; width: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #0f172a; padding: 40px 20px; text-align: center;
            position: relative; z-index: 5;
        }

        .intro-text-container { max-width: 900px; }

        #typewriter-text {
            font-size: 2.2rem; color: #e2e8f0; line-height: 1.6; display: inline; font-weight: 300;
        }

        .highlight { color: #38bdf8; font-weight: 600; }

        .cursor {
            font-size: 2.5rem; color: #38bdf8; animation: blink 0.8s infinite;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* The Final Entry Button (Hidden until typing is done) */
        .enter-btn {
            display: inline-block; padding: 15px 40px; background: #38bdf8;
            color: #0f172a; text-decoration: none; font-weight: bold; font-size: 1.2rem;
            border-radius: 30px; transition: all 0.3s ease; margin-top: 50px;
            
            opacity: 0; /* Hidden initially */
            transform: translateY(20px);
        }

        .enter-btn:hover { box-shadow: 0 0 20px rgba(56, 189, 248, 0.6); transform: translateY(-5px); background: #fff; }

        .enter-btn.visible {
            opacity: 1; transform: translateY(0); /* Fades in via Javascript */
        }

        /* --- 3. FLOATING FEEDBACK BUTTON --- */
        .feedback-fab { position: fixed; bottom: 30px; left: 30px; background: #1e293b; color: #cbd5e1; border: 1px solid #334155; padding: 12px 20px; border-radius: 30px; font-weight: 600; cursor: pointer; z-index: 99; box-shadow: 0 5px 15px rgba(0,0,0,0.5); transition: all 0.3s ease; display: flex; align-items: center; gap: 8px; }
        .feedback-fab:hover { border-color: #ef4444; color: #fff; transform: translateY(-3px); box-shadow: 0 8px 20px rgba(239, 68, 68, 0.3); }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-box { background: #0f172a; border: 1px solid #38bdf8; padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; position: relative; text-align: center; animation: popIn 0.3s ease; }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; color: #94a3b8; cursor: pointer; }
        .close-btn:hover { color: #ef4444; }
        .modal-input { width: 100%; padding: 12px; margin-bottom: 15px; background: #1e293b; border: 1px solid #334155; color: white; border-radius: 8px; }
        .submit-btn { width: 100%; padding: 12px; background: #38bdf8; color: #0f172a; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        @media (max-width: 600px) { h1 { font-size: 3rem; } #typewriter-text { font-size: 1.5rem; } }
    </style>
</head>
<body>

    <div class="welcome-entry">
        <video autoplay muted loop playsinline class="welcome-video">
            <source src="welcome.mp4" type="video/mp4">
        </video>
        <div class="welcome-overlay"></div>
        
        <div class="welcome-content">
            <h1>Welcome.</h1>
            <p class="subtitle">To the digital workspace of a future engineer.</p>
            <a href="#intro" class="scroll-down-btn">Scroll Down 👇</a>
        </div>
    </div>

    <div id="intro" class="intro-section">
        <div class="intro-text-container">
            <h2 id="typewriter-text"></h2><span class="cursor">|</span>
            <br>
            <a href="home.html" class="enter-btn" id="final-enter-btn">Explore My Profile 🚀</a>
        </div>
    </div>

    <button class="feedback-fab" onclick="openFeedbackModal()"><span>🐛</span> Report Issue</button>
    <div id="feedback-modal" class="modal-overlay">
        <div class="modal-box">
            <span class="close-btn" onclick="closeFeedbackModal()">&times;</span>
            <h2 style="color: #38bdf8; margin-bottom: 15px;">Report Issue</h2>
            <form id="feedback-form" action="https://formspree.io/f/xbdpvbgl" method="POST">
                <input type="hidden" name="_subject" value="🚨 BUG REPORT from Welcome Page">
                <input type="text" name="name" placeholder="Your Name (Optional)" class="modal-input">
                <textarea name="message" placeholder="Describe the issue here..." required class="modal-input" rows="4"></textarea>
                <button type="submit" class="submit-btn">Submit Report</button>
            </form>
            <p id="feedback-success" style="display: none; color: #38bdf8; margin-top: 15px;">✅ Report sent successfully!</p>
        </div>
    </div>

    <script>
        // 1. The Typewriter Logic
        const introText = "Hi, I am Shridhar. An Electronics & Communication Engineer specializing in IoT embedded systems, hardware design, and clean web development. ";
        let index = 0;
        const speed = 40; // The lower the number, the faster it types
        let hasTyped = false; // Prevents it from re-typing if they scroll up and down

        const targetElement = document.getElementById("typewriter-text");
        const enterButton = document.getElementById("final-enter-btn");

        function typeWriter() {
            if (index < introText.length) {
                targetElement.innerHTML += introText.charAt(index);
                index++;
                setTimeout(typeWriter, speed);
            } else {
                // When typing is completely finished, reveal the button!
                enterButton.classList.add("visible");
            }
        }

        // 2. The Scroll Observer (Waits until they scroll down)
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting && !hasTyped) {
                    hasTyped = true; // Locks it so it only happens once
                    setTimeout(typeWriter, 400); // Waits half a second after scrolling down to start typing
                }
            });
        }, { threshold: 0.5 }); // Triggers when the section is 50% visible on screen

        observer.observe(document.getElementById("intro"));

        // 3. Feedback Modal Logic
        function openFeedbackModal() { document.getElementById('feedback-modal').style.display = 'flex'; }
        function closeFeedbackModal() { document.getElementById('feedback-modal').style.display = 'none'; document.getElementById('feedback-success').style.display = 'none'; }
        
        var feedbackForm = document.getElementById("feedback-form");
        feedbackForm.addEventListener("submit", async function(event) {
            event.preventDefault(); 
            var data = new FormData(event.target);
            fetch(event.target.action, { method: feedbackForm.method, body: data, headers: { 'Accept': 'application/json' } }).then(response => {
                if (response.ok) { feedbackForm.reset(); document.getElementById('feedback-success').style.display = 'block'; setTimeout(closeFeedbackModal, 3000); } 
                else { alert("Oops! There was a problem sending your report."); }
            });
        });
    </script>

</body>
</html>
