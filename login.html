<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Portfolio</title>
    <style>
        /* Base reset and styling */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Dark background to match your site's aesthetic */
        body {
            background-color: #0d1117;
            background-image: radial-gradient(circle at center, #161b22 0%, #0d1117 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #c9d1d9;
        }

        /* Sleek login card container */
        .login-container {
            background-color: #161b22;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            border: 1px solid #30363d;
            text-align: center;
        }

        .login-container h2 {
            margin-bottom: 10px;
            font-size: 24px;
            color: #ffffff;
        }

        .login-container p {
            margin-bottom: 30px;
            font-size: 14px;
            color: #8b949e;
        }

        /* Form input styling */
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            background-color: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #007bff; /* Matches your Send Message button */
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.2);
        }

        /* Primary Action Button */
        .login-btn {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            background-color: #0056b3;
        }

        /* Back to home link */
        .back-link {
            display: inline-block;
            margin-top: 25px;
            color: #58a6ff;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: #79c0ff;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Admin Portal</h2>
        <p>Enter your credentials to access the dashboard.</p>
        
        <form action="#" method="POST" id="loginForm">
            <div class="input-group">
                <label for="username">Username / Email</label>
                <input type="text" id="username" name="username" placeholder="admin@example.com" required>
            </div>
            
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="login-btn">Secure Login</button>
        </form>

        <a href="index.html" class="back-link">&larr; Back to Portfolio</a>
    </div>

    <script>
        // A tiny bit of JavaScript just to prevent the form from actually reloading the page for now
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('This is a static mockup! To make it work, you will need to link a backend authentication service like Firebase.');
        });
    </script>
</body>
</html>
